<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Draft Agent — Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0e0e10;
      --surface:  #16161a;
      --surface2: #1e1e24;
      --border:   rgba(255,255,255,0.08);
      --accent:   #7c6aff;
      --glow:     rgba(124,106,255,0.2);
      --text:     #e8e8f0;
      --muted:    #6b6b80;
      --label:    #9090a8;
      --success:  #4ade80;
      --error:    #f87171;
      --font:     'Syne', sans-serif;
      --mono:     'JetBrains Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      width: 320px;
      min-height: 420px;
    }

    /* Header */
    .header {
      background: var(--surface);
      padding: 16px 18px 14px;
      border-bottom: 1px solid var(--border);
    }
    .header-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 2px;
    }
    .logo {
      font-size: 20px;
      color: var(--accent);
      animation: pulse 3s ease-in-out infinite;
    }
    .title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .subtitle {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    /* Body */
    .body {
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .field-label {
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .field-desc {
      font-size: 10px;
      color: var(--muted);
      line-height: 1.5;
      margin-top: 2px;
    }

    input[type="text"],
    input[type="password"],
    input[type="url"] {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 11px;
      padding: 8px 10px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--glow);
    }
    input::placeholder { color: var(--muted); }

    /* Toggle */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .toggle-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }
    .toggle input { display: none; }
    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--surface2);
      border-radius: 99px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-thumb {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      background: var(--muted);
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
      pointer-events: none;
    }
    .toggle input:checked ~ .toggle-track { background: var(--accent); border-color: var(--accent); }
    .toggle input:checked ~ .toggle-thumb { transform: translateX(16px); background: white; }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 2px 0;
    }

    /* Status badge */
    #status-badge {
      font-family: var(--mono);
      font-size: 10px;
      padding: 4px 10px;
      border-radius: 99px;
      text-align: center;
      display: none;
    }
    #status-badge.show { display: block; }
    #status-badge.success { background: rgba(74,222,128,0.1); color: var(--success); border: 1px solid rgba(74,222,128,0.3); }
    #status-badge.error   { background: rgba(248,113,113,0.1); color: var(--error);   border: 1px solid rgba(248,113,113,0.3); }

    /* Footer */
    .footer {
      padding: 0 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    button {
      font-family: var(--font);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      padding: 9px 14px;
      transition: all 0.18s ease;
      width: 100%;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover {
      background: #9080ff;
      box-shadow: 0 0 16px var(--glow);
    }
    .btn-secondary {
      background: var(--surface2);
      color: var(--label);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover {
      background: #25252d;
      color: var(--text);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-top">
      <span class="logo">✦</span>
      <span class="title">Draft Agent</span>
    </div>
    <div class="subtitle">Gmail AI Pipeline Extension</div>
  </div>

  <div class="body">

    <div class="field">
      <span class="field-label">Pipeline API URL</span>
      <input type="url" id="pipeline-url" placeholder="https://your-api.com/process" />
      <span class="field-desc">Your backend endpoint that receives email data and returns a draft reply.</span>
    </div>

    <div class="field">
      <span class="field-label">API Key <span style="color:var(--muted); font-weight:400">(optional)</span></span>
      <input type="password" id="api-key" placeholder="Bearer token or API key" />
      <span class="field-desc">Sent as <code style="color:var(--accent)">Authorization: Bearer …</code> header.</span>
    </div>

    <div class="divider"></div>

    <div class="field">
      <div class="toggle-row">
        <div class="toggle-info">
          <span class="field-label">Auto-fetch on open</span>
          <span class="field-desc">Automatically start pipeline when an email is opened.</span>
        </div>
        <label class="toggle">
          <input type="checkbox" id="auto-fetch" />
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>
    </div>

    <div id="status-badge"></div>
  </div>

  <div class="footer">
    <button class="btn-primary" id="save-btn">Save Settings</button>
    <button class="btn-secondary" id="test-btn">Test Connection</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
